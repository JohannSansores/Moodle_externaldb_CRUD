#Customize your sites
<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /usr/local/apache2/htdocs/public

    <Directory /usr/local/apache2/htdocs/public>
        AllowOverride All
        Require all granted
    </Directory>

    ProxyPassMatch ^/(.*\.php(/.*)?)$ fcgi://webapp:9000/var/www/html/public/$1
    DirectoryIndex index.php index.html
</VirtualHost>
